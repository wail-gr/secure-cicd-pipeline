# =============================================================================
# CI Pipeline — Lint, Test, Hadolint, Build Verification
# =============================================================================
# Triggered on every push and pull request.
# All jobs must pass before CD pipeline can deploy.
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.23"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Static Analysis & Linting
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Check formatting
        run: |
          gofmt_output=$(gofmt -l .)
          if [ -n "$gofmt_output" ]; then
            echo "❌ The following files are not formatted:"
            echo "$gofmt_output"
            exit 1
          fi
          echo "✅ All files are properly formatted"

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests with Race Detection & Coverage
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage summary
        run: |
          go tool cover -func=coverage.out
          echo ""
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "📊 Total coverage: $TOTAL"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Dockerfile Structural Linting (Hadolint)
  # ---------------------------------------------------------------------------
  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint on production Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Run Hadolint on dev Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.dev
          config: .hadolint.yaml
          failure-threshold: error

  # ---------------------------------------------------------------------------
  # Job 4: Build Verification (ensures Docker image compiles)
  # ---------------------------------------------------------------------------
  build-test:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint, test, hadolint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: secure-api:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=ci-test
            COMMIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Verify image size
        run: |
          docker images secure-api:ci-test --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" || echo "Image built via buildx (not loaded locally)"
