# =============================================================================
# CD Pipeline — Build, Push to Artifact Registry, Deploy to Cloud Run
# =============================================================================
# Triggered only on push to main (after CI passes).
# Skips gracefully if GCP secrets are not configured.
# =============================================================================

name: CD Pipeline — Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  GO_VERSION: "1.23"
  CLOUD_RUN_SERVICE: secure-api
  IMAGE_NAME: secure-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Ensure only one deployment runs at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Check GCP configuration (secrets)
  # ---------------------------------------------------------------------------
  check-secrets:
    name: Check GCP Configuration
    runs-on: ubuntu-latest
    environment: production
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - name: Check for GCP Secrets
        id: check
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -n "$GCP_SA_KEY" ] && [ -n "$GCP_PROJECT_ID" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
            echo "✅ GCP secrets are configured."
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "⚠️ GCP secrets are NOT configured."
          fi

  # ---------------------------------------------------------------------------
  # Job 1: Build & Push hardened container to Artifact Registry
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: check-secrets
    environment: production
    # Skip if GCP secrets are not configured
    if: ${{ needs.check-secrets.outputs.has-secrets == 'true' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_AR_REPO }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push to Artifact Registry
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          provenance: true
          sbom: true

      - name: Output image details
        run: |
          echo "📦 Image pushed successfully"
          echo "   Tags: ${{ steps.meta.outputs.tags }}"
          echo "   Digest: ${{ steps.build.outputs.digest }}"

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to Cloud Run
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          flags: |
            --platform=managed
            --allow-unauthenticated
            --memory=256Mi
            --cpu=1
            --max-instances=10
            --min-instances=0
            --concurrency=80
            --port=8080
            --timeout=300s
            --cpu-throttling
            --set-env-vars=ENVIRONMENT=production,LOG_LEVEL=info

      - name: Verify deployment
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          echo "🚀 Deployed to: $SERVICE_URL"
          echo ""
          echo "Verifying health endpoint..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health" --max-time 10 || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️  Health check returned HTTP $HTTP_STATUS"
            echo "   Service may still be starting up (cold start)"
          fi

      - name: Output deployment summary
        run: |
          echo ""
          echo "============================================"
          echo "  Deployment Summary"
          echo "============================================"
          echo "  Service:  ${{ env.CLOUD_RUN_SERVICE }}"
          echo "  Region:   ${{ secrets.GCP_REGION }}"
          echo "  URL:      ${{ steps.deploy.outputs.url }}"
          echo "  Commit:   ${{ github.sha }}"
          echo "============================================"

  # ---------------------------------------------------------------------------
  # Job 3: Skip notice when GCP is not configured
  # ---------------------------------------------------------------------------
  skip-notice:
    name: CD Skipped (No GCP Secrets)
    runs-on: ubuntu-latest
    needs: check-secrets
    if: ${{ needs.check-secrets.outputs.has-secrets == 'false' }}
    steps:
      - name: Notice
        run: |
          echo "ℹ️  CD pipeline skipped — GCP secrets are not configured."
          echo ""
          echo "To enable deployment, add these GitHub Secrets:"
          echo "  • GCP_SA_KEY       — Service account JSON key (base64)"
          echo "  • GCP_PROJECT_ID   — GCP project ID"
          echo "  • GCP_REGION       — Deployment region (e.g., us-central1)"
          echo "  • GCP_AR_REPO      — Artifact Registry repository name"
          echo ""
          echo "See README.md for setup instructions."
