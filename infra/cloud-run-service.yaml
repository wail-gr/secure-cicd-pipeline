# =============================================================================
# Cloud Run Service Definition
# =============================================================================
# Apply with: gcloud run services replace infra/cloud-run-service.yaml
# =============================================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: secure-api
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Auto-scaling configuration
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"

        # CPU allocation: throttled when not processing requests
        run.googleapis.com/cpu-throttling: "true"

        # Startup CPU boost for faster cold starts
        run.googleapis.com/startup-cpu-boost: "true"

    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: cloud-run-sa@PROJECT_ID.iam.gserviceaccount.com

      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPO_NAME/secure-api:latest
          ports:
            - name: http1
              containerPort: 8080

          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"

          resources:
            limits:
              cpu: "1"
              memory: "256Mi"

          # Startup probe: wait for the service to be ready
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 2
            failureThreshold: 15
            timeoutSeconds: 3

          # Liveness probe: restart if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

  traffic:
    - percent: 100
      latestRevision: true
